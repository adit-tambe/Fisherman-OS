<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Simulator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="simulator-container">
        <!-- Phone wrapper for premium feel -->
        <div class="phone-frame">
            
            <!-- WhatsApp Header -->
            <header class="chat-header">
                <div class="profile-section">
                    <div class="avatar">
                        <img src="https://ui-avatars.com/api/?name=Fisherman+Bot&background=128C7E&color=fff&rounded=true" alt="Bot Avatar">
                    </div>
                    <div class="contact-info">
                        <h2>Fisherman OS Bot</h2>
                        <span class="status">online</span>
                    </div>
                </div>
            </header>

            <!-- Chat Area -->
            <div class="chat-area" id="chatArea">
                <!-- Messages will be injected here via JS -->
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-container">
                    <input type="text" id="messageInput" placeholder="Type a message" autocomplete="off">
                </div>
                <button id="sendBtn" class="send-btn">
                    <!-- Send Icon SVG -->
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M1.101 21.757 23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"></path>
                    </svg>
                </button>
            </div>

        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
